<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/reset.css" rel="stylesheet">
    <link href="styles/layout.css" rel="stylesheet">
    <link href="styles/styles.css" rel="stylesheet">
    <!-- LightBox2 -->
    <link href="styles/lightbox.css" rel="stylesheet" />
    <title>Iridium Films</title>
</head>

<body>
    <header><img src="images/iridium_films_logo_cropped.png" class="logo"></header>
    <main>

        <div class="photo-grid">
            <!-- Link is to full resolution photo via LightBox2. Embedded image should be reduced resolution for faster loading. -->
            <a href="images/alixandra_jade/aj1.jpg" data-lightbox="alixandra_jade" data-title="" class="card card-tall card-wide"><img class="card card-tall card-wide" src="images/alixandra_jade/aj1_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj2.jpg" data-lightbox="alixandra_jade" data-title="" class="card card-tall">
                <img class="card card-tall" src="images/alixandra_jade/aj2_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj3.jpg" data-lightbox="alixandra_jade" data-title="" class="card">
                <img class="card" src="images/alixandra_jade/aj3_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj4.jpg" data-lightbox="alixandra_jade" data-title="" class="card">
                <img class="card" src="images/alixandra_jade/aj4_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj5.jpg" data-lightbox="alixandra_jade" data-title="" class="card">
                <img class="card" src="images/alixandra_jade/aj5_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj6.jpg" data-lightbox="alixandra_jade" data-title="" class="card">
                <img class="card" src="images/alixandra_jade/aj6_low_res.jpg" alt="" loading="lazy"></a>

            <a href="images/alixandra_jade/aj7.jpg" data-lightbox="alixandra_jade" data-title="" class="card card-wide">
                <img class="card card-wide" src="images/alixandra_jade/aj7_low_res.jpg" alt="" loading="lazy"></a>
        </div>
    </main>

    <footer>
        &#169; 2025 Iridium Films
    </footer>
    <script src="scripts/lightbox-plus-jquery.js"></script>
</body>

</html>
